name: "Copilot Setup Steps"

# Pre-builds the repo so GitHub Copilot Coding Agent can work on it.
# Customize the build steps for your specific repo.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '{{DOTNET_VERSION}}'

      - name: Restore dependencies
        run: {{RESTORE_COMMAND}}

      - name: Build
        shell: bash
        continue-on-error: true
        run: {{BUILD_COMMAND}}

      - name: Set environment variables
        shell: bash
        run: |
          echo "DOTNET_ROOT=$GITHUB_WORKSPACE/.dotnet" >> "$GITHUB_ENV"

      - name: Reset tracked files to clean workspace
        shell: bash
        run: |
          git reset --hard HEAD
